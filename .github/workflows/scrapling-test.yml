name: scrapling-youtube-test
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Install Scrapling + stealth browser
        run: |
          pip install -U scrapling
          scrapling install || true
      - name: Can StealthyFetcher bypass YouTube's bot wall from GitHub's IP?
        run: |
          python - <<'PY'
          import re
          from scrapling.fetchers import StealthyFetcher
          url = "https://www.youtube.com/watch?v=2byPP_9F0-Q"
          try:
              p = StealthyFetcher.fetch(url, headless=True, network_idle=False, timeout=60000, humanize=True)
              html = str(getattr(p, "html_content", "") or getattr(p, "body", "") or p)
              title = re.search(r'<title>([^<]+)</title>', html)
              views = re.search(r'"viewCount":"(\d+)"', html)
              bot = "not a bot" in html.lower() or "sign in to confirm" in html.lower()
              print(f"RESULT: title={title.group(1)[:60] if title else None} | views={views.group(1) if views else None} | bot_wall={bot} | html_len={len(html)}")
          except Exception as e:
              print(f"ERROR {type(e).__name__}: {e}")
          PY
